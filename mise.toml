[tools]
# Environments
node = 'latest'
'github:nubjs/nub' = { version = 'latest', postinstall = 'nub pm pin' }
# Linters & Formatters
hk = 'latest'
stylua = 'latest'
pkl = 'latest'

[deps.nub]
description = 'Automatically install Node.js dependencies via nub.'
sources = ['package.json', 'nub.lock']
outputs = ['node_modules/']
run = 'nub install'
auto = true

[env]
_.path = ['{{config_root}}/node_modules/.bin']

[tasks.dev]
description = 'Migrate @antfu/eslint-config with @oxlint/migrate and generate .oxlintrc.generated.json.'
run = 'nub exec @oxlint/migrate ./fixtures/eslint.config.js --output-file .oxlintrc.generated.json --with-nursery'

[tasks.build]
description = 'Generate OxLint configuration.'
run = 'nub run ./scripts/generate-config.ts'

[tasks.start]
description = 'Run all checks.'
run = { task = 'check' }

[tasks.check]
description = 'Run all checks.'
usage = '''
flag "-s --staged" help="Run on staged files only without stashing unstaged changes"
arg "[rest]" var=#true help="Additional arguments to pass to the test runner"
'''
run = '''
hk check {{ "--staged" if usage.staged else "--all" }} {{ usage.rest | join(sep=' ') if usage.rest else '' }}
'''

[tasks.fix]
description = 'Fix all check issues.'
usage = '''
flag "-s --staged" help="Run on staged files only without stashing unstaged changes"
arg "[rest]" var=#true help="Additional arguments to pass to the test runner"
'''
run = '''
hk fix {{ "--staged" if usage.staged else "--all" }} {{ usage.rest | join(sep=' ') if usage.rest else '' }}
'''

[tasks.test]
description = "Run tests."
usage = '''
flag "-w --watch" help="Watch files for changes and rerun tests"
arg "[rest]" var=#true help="Additional arguments to pass to the test runner"
'''
run = '''
vitest {{ '' if usage.watch else 'run' }} {{ usage.rest | join(sep=' ') if usage.rest else '' }}
'''

[tasks.prerelease]
description = 'Prepare for release.'
# All tasks in parallel.
run = { tasks = ["check", "test"] }

[tasks.release]
description = 'Bump the version and push new version of this workflow with a Git tag.'
depends = "prerelease"
run = "bumpp"
raw = true

[tasks.changelog]
description = 'Generate GitHub changelog.'
run = "changelogithub"

[tasks.publish]
description = 'Publish the package.'
run = "nub publish --provenance"

[tasks.publish-commit]
description = 'Publish the committed changes.'
run = "pkg-pr-new publish"
