[env]
_.path = [ "./node_modules/.bin" ]

[tools]
bun = "latest"
aube = "latest"

[tasks.prepare]
run = "mise generate git-pre-commit --write"

[tasks.pre-commit]
run = "nano-staged"

[tasks.dev]
run = "aubr dev"

[tasks.build]
run = "aubr build"

[tasks.start]
run = { task = "lint" }

[tasks.lint]
run = [
  "aubr oxlint",
  "aubr eslint"
]

[tasks."lint:fix"]
run = [
  "aubr oxlint --fix",
  "aubr eslint --fix"
]

[tasks.typecheck]
run = "aubr typecheck"

[tasks.unused]
run = "aubr unused"

# In order to running attw and publint parallely,
# we need to split them into separate tasks,
# and then create a parent task to run them together.
[tasks.attw]
run = "aubr attw"
hide = true

[tasks.publint]
run = "aubr publint"
hide = true

[tasks.pubcheck]
run = { tasks = [
  "attw",
  "publint"
] }

[tasks.gitcheck]
depends = "build"
run = """
#!/bin/bash
if [[ -z "$(git status --porcelain)" ]]; then
  echo "✅ Git repo is clean."
else
  echo "🔴 Git repo is dirty. Aborting."
  exit 1
fi
"""

[tasks.check]
run = { tasks = [
  "lint",
  "typecheck",
  "unused",
  "pubcheck",
  "gitcheck"
] }

[tasks.test]
depends = "build"
run = "aubr test"

[tasks."test:watch"]
run = "aubr test:watch"

[tasks.prerelease]
run = { tasks = [
  "check",
  "test"
] }

[tasks.release]
depends = "prerelease"
run = "aubr release"
raw = true
