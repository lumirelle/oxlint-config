[env]
_.path = [ "./node_modules/.bin" ]

[tools]
bun = "latest"

[tasks.prepare]
run = "mise generate git-pre-commit --write"

[tasks.pre-commit]
run = "nano-staged"

[tasks.dev]
run = "bunx @oxlint/migrate ./fixtures/eslint.config.js --output-file .oxlintrc.generated.json --with-nursery"

[tasks.build]
run = "bun run ./scripts/generate-config.ts"

[tasks.start]
depends = "lint"

[tasks."lint:oxlint"]
run = "oxlint --config .oxlintrc.json"

[tasks."lint:eslint"]
wait_for = "lint:oxlint"
run = "eslint"

[tasks.lint]
depends = [
  "lint:oxlint",
  "lint:eslint"
]

[tasks."lint:fix:oxlint"]
run = "oxlint --config .oxlintrc.json --fix"

[tasks."lint:fix:eslint"]
wait_for = "lint:fix:oxlint"
run = "eslint --fix"

[tasks."lint:fix"]
depends = [
  "lint:fix:oxlint",
  "lint:fix:eslint"
]

[tasks.typecheck]
run = "tsc --build --noEmit"

[tasks.unused]
run = "knip-bun"

[tasks."pubcheck:attw"]
run = "attw --pack --profile esm-only"

[tasks."pubcheck:publint"]
run = "publint"

[tasks.pubcheck]
depends = [
  "pubcheck:attw",
  "pubcheck:publint"
]

[tasks.gitcheck]
depends = "build"
run = "bun run ./scripts/check-git-status.sh"

[tasks.check]
depends = [
  "lint",
  "typecheck",
  "unused",
  "pubcheck",
  "gitcheck"
]

[tasks.test]
depends = "build"
run = "bun test"

[tasks.prerelease]
depends = [
  "check",
  "test"
]

[tasks.release]
depends = "prerelease"
run = "bumpp"
raw = true
